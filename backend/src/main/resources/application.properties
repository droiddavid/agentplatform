server.port=8083
spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/agentplatform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:locutus}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Model gateway (Ollama)
model.gateway.url=http://localhost:11434

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT settings (example secret - override in production with env/secret manager)
## Read secrets from environment (set JWT_SECRET and MYSQL_ROOT_PASSWORD in production/CI)
jwt.secret=${JWT_SECRET:change_this_secret_for_dev_only_please_change}
jwt.access.token.expiry.seconds=900
jwt.refresh.token.expiry.seconds=1209600
