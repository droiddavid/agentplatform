server:
  port: ${SERVER_PORT:8083}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agentplatform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: locutus
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:change_this_secret_for_dev_only_please_change}
  access:
    token:
      expiry:
        seconds: 900
  refresh:
    token:
      expiry:
        seconds: 1209600

logging:
  level:
    com.agentplatform.backend.auth.jwt: INFO
    com.agentplatform.backend.agents: INFO
    org.springframework.security: DEBUG