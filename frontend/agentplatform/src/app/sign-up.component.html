<div class="signup">
  <h2>Sign Up</h2>
  <form (ngSubmit)="submit()">
    <label>Email
      <input name="email" [(ngModel)]="email" required />
    </label>
    <label>Password
      <input name="password" type="password" [(ngModel)]="password" required />
    </label>
    @if (error) {
      <div class="error">{{error}}</div>
    }
    <button type="submit" [disabled]="loading">Sign Up</button>
  </form>
</div>
