<div class="container mx-auto py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Run History</h1>
  </div>

  <div class="bg-white shadow rounded-lg mb-6 p-4">
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select
          [(ngModel)]="selectedStatus"
          (change)="onStatusFilterChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring">
          <option value="">All Statuses</option>
          <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Task ID</label>
        <input
          [(ngModel)]="selectedTaskId"
          (change)="onTaskFilterChange()"
          type="number"
          placeholder="Filter by task..."
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Agent ID</label>
        <input
          [(ngModel)]="selectedAgentId"
          (change)="onAgentFilterChange()"
          type="number"
          placeholder="Filter by agent..."
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring">
      </div>
    </div>
  </div>

  <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="text-center py-8">
    <div class="inline-block animate-spin">
      <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
      </svg>
    </div>
  </div>

  <div *ngIf="!isLoading && runs.length === 0" class="text-center py-8">
    <p class="text-gray-500">No runs found</p>
  </div>

  <div *ngIf="!isLoading && runs.length > 0" class="bg-white shadow rounded-lg overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">ID</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Task</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Agent</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Status</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Created</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Duration</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let run of runs" class="hover:bg-gray-50">
          <td class="px-6 py-4 text-sm text-gray-900">
            <button (click)="viewRun(run.id)" class="text-blue-600 hover:underline font-mono">
              #{{ run.id }}
            </button>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">#{{ run.taskId }}</td>
          <td class="px-6 py-4 text-sm text-gray-600">#{{ run.agentId }}</td>
          <td class="px-6 py-4 text-sm">
            <span [ngClass]="getStatusBadgeColor(run.status)" class="px-3 py-1 rounded-full text-xs font-semibold">
              {{ run.status }}
            </span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ formatDate(run.createdAt) }}</td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ getDuration(run.startedAt, run.completedAt) }}</td>
          <td class="px-6 py-4 text-sm">
            <button
              *ngIf="run.status === 'pending'"
              (click)="startRun(run.id)"
              class="mr-2 text-green-600 hover:text-green-900">
              Start
            </button>
            <button
              *ngIf="run.status === 'running'"
              (click)="cancelRun(run.id)"
              class="text-red-600 hover:text-red-900">
              Cancel
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && totalPages > 0" class="mt-6 flex justify-center items-center gap-2">
    <button
      [disabled]="currentPage === 0"
      (click)="goToPage(currentPage - 1)"
      class="px-3 py-2 bg-gray-200 rounded disabled:opacity-50">
      Previous
    </button>
    <span class="text-gray-700">
      Page {{ currentPage + 1 }} of {{ totalPages }}
    </span>
    <button
      [disabled]="currentPage >= totalPages - 1"
      (click)="goToPage(currentPage + 1)"
      class="px-3 py-2 bg-gray-200 rounded disabled:opacity-50">
      Next
    </button>
  </div>
</div>
