<div class="container mx-auto py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Tasks</h1>
    <button
      (click)="createNewTask()"
      class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      + New Task
    </button>
  </div>

  <div class="bg-white shadow rounded-lg mb-6 p-4">
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select
          [(ngModel)]="selectedStatus"
          (change)="onStatusFilterChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring">
          <option value="">All Statuses</option>
          <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
        <select
          [(ngModel)]="selectedPriority"
          (change)="onPriorityFilterChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring">
          <option value="">All Priorities</option>
          <option *ngFor="let priority of priorityOptions" [value]="priority">{{ priority }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <select
          [(ngModel)]="selectedCategory"
          (change)="onCategoryFilterChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring">
          <option value="">All Categories</option>
          <option *ngFor="let category of categoryOptions" [value]="category">{{ category }}</option>
        </select>
      </div>
    </div>
  </div>

  <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="text-center py-8">
    <div class="inline-block animate-spin">
      <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
      </svg>
    </div>
  </div>

  <div *ngIf="!isLoading && tasks.length === 0" class="text-center py-8">
    <p class="text-gray-500">No tasks found</p>
  </div>

  <div *ngIf="!isLoading && tasks.length > 0" class="bg-white shadow rounded-lg overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Title</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Category</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Status</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Priority</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Due Date</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let task of tasks" class="hover:bg-gray-50">
          <td class="px-6 py-4 text-sm text-gray-900">
            <button (click)="viewTask(task.id)" class="text-blue-600 hover:underline">
              {{ task.title }}
            </button>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ task.category }}</td>
          <td class="px-6 py-4 text-sm">
            <span [ngClass]="getStatusColor(task.status)" class="px-3 py-1 rounded-full text-xs font-semibold">
              {{ task.status }}
            </span>
          </td>
          <td class="px-6 py-4 text-sm">
            <span [ngClass]="getPriorityColor(task.priority)" class="px-3 py-1 rounded-full text-xs font-semibold">
              {{ task.priority }}
            </span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">
            {{ task.dueAt ? formatDate(task.dueAt) : '-' }}
          </td>
          <td class="px-6 py-4 text-sm">
            <button
              (click)="editTask(task.id)"
              class="mr-3 text-blue-600 hover:text-blue-900">
              Edit
            </button>
            <button
              (click)="archiveTask(task.id)"
              class="mr-3 text-yellow-600 hover:text-yellow-900">
              Archive
            </button>
            <button
              (click)="deleteTask(task.id)"
              class="text-red-600 hover:text-red-900">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && totalPages > 0" class="mt-6 flex justify-center items-center gap-2">
    <button
      [disabled]="currentPage === 0"
      (click)="goToPage(currentPage - 1)"
      class="px-3 py-2 bg-gray-200 rounded disabled:opacity-50">
      Previous
    </button>
    <span class="text-gray-700">
      Page {{ currentPage + 1 }} of {{ totalPages }}
    </span>
    <button
      [disabled]="currentPage >= totalPages - 1"
      (click)="goToPage(currentPage + 1)"
      class="px-3 py-2 bg-gray-200 rounded disabled:opacity-50">
      Next
    </button>
  </div>
</div>
