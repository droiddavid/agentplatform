name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -P 3306 -u root -ptestpassword123 -e "SELECT 1" && break || sleep 2
          done

      - name: Create database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -ptestpassword123 -e "CREATE DATABASE IF NOT EXISTS agentplatform CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Build and run Flyway migrations
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key' }}
        working-directory: backend
        run: |
          ./mvnw -B -DskipTests=true org.flywaydb:flyway-maven-plugin:9.22.0:migrate -Dflyway.url=jdbc:mysql://127.0.0.1:3306/agentplatform -Dflyway.user=root -Dflyway.password=testpassword123

      - name: Build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key' }}
        working-directory: backend
        run: |
          ./mvnw -B -DskipTests=true clean package
